<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MaxCINE — Precision Imaging Systems</title>
    <meta
      name="description"
      content="MaxCINE — A professional imaging brand focused on premium drone filters, cinema accessories and brand peripherals, engineered for precision imaging."
    />
    <!-- 适配MaxCINE仓库的根路径（大小写完全匹配） -->
    <base href="/MaxCINE/" />
    <!-- 样式文件路径（./开头） -->
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="mc-header">
      <div class="mc-header-inner">
        <a href="#" class="mc-logo" aria-label="MaxCINE">
          <!-- Logo路径（./开头） -->
          <img src="./assets/logo.png" alt="MaxCINE" />
        </a>
        <nav class="mc-nav" aria-label="Primary navigation">
          <a href="#filters" data-i18n="nav.filters" class="mc-nav-link">航拍无人机滤镜</a>
          <a href="#cinema" data-i18n="nav.cinema" class="mc-nav-link">影视制作配件</a>
          <a href="#merch" data-i18n="nav.merch" class="mc-nav-link">品牌周边</a>
          <a href="#support" data-i18n="nav.support" class="mc-nav-link">支持</a>
          <a href="#buy" data-i18n="nav.buy" class="mc-nav-link">购买</a>
          <button class="mc-lang-toggle" data-lang="cn" aria-label="Switch language">
            <span class="mc-lang-option mc-lang-option--active">CN</span>
            <span class="mc-lang-separator">|</span>
            <span class="mc-lang-option">EN</span>
          </button>
        </nav>
      </div>
    </header>

    <main>
      <!-- Hero -->
      <section class="mc-hero" aria-labelledby="hero-title">
        <div class="mc-hero-media" role="img" aria-label="MaxCINE professional drone filter on industrial drone"></div>
        <div class="mc-hero-overlay"></div>
        <div class="mc-hero-content">
          <p class="mc-hero-kicker" data-i18n="hero.kicker">专业级航拍无人机增广镜</p>
          <h1 id="hero-title" class="mc-hero-title" data-i18n="hero.title">视界尽展</h1>
          <p class="mc-hero-subtitle" data-i18n="hero.subtitle">适用MAVIC 4 Pro 增广镜</p>
          <a href="#featured" class="mc-btn mc-btn-outline" data-i18n="hero.cta">
            了解更多 / Learn More
          </a>
        </div>
      </section>

      <!-- 以下原有内容不变（省略，你保留自己的） -->

      <footer class="mc-footer">
        <div class="mc-footer-inner">
          <div class="mc-footer-left">
            <p class="mc-footer-brand">MaxCINE</p>
            <p class="mc-footer-copy">
              © <span id="mc-year"></span> MaxCINE Imaging Systems. All rights reserved.
            </p>
          </div>
          <div class="mc-footer-middle">
            <a href="#" class="mc-footer-link">Terms</a>
            <a href="#" class="mc-footer-link">Privacy</a>
            <a href="#" class="mc-footer-link">Cookies</a>
          </div>
        </div>
      </footer>

      <!-- 脚本路径（./开头） -->
      <script src="./https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
      <script src="./script.js?v=3"></script>
    </main>
  </body>
</html>
